<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アサーション自己練習アプリ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  /* ── 暖色ベース ── */
  --bg:       #fffaf6;          /* 温かみのある白 */
  --bg2:      #fdf0e6;          /* 薄いアプリコット */
  --bg3:      #fae8d4;          /* 背景：桃色がかったクリーム */
  --bg-card:  #ffffff;

  --text:     #3d2b1f;          /* 深いこげ茶 */
  --text2:    #7a5c4a;          /* 中間ブラウン */
  --text3:    #b08c78;          /* 薄いテラコッタ */

  --border:   rgba(180,110,70,0.18);
  --border2:  rgba(180,110,70,0.32);

  --radius:   14px;
  --radius-sm: 9px;

  /* アクセントカラー（暖色系） */
  --primary:        #c0622a;    /* テラコッタ：メインボタン */
  --primary-light:  #fbe8d8;
  --primary-hover:  #a84f20;

  --apricot:        #f5a263;    /* アプリコット：完了ドット */
  --apricot-light:  #fef0e3;

  --rose:           #e07070;    /* ローズ：上級バッジ */
  --rose-light:     #fdeaea;
  --rose-dark:      #9c3a3a;

  --gold:           #c98a2a;    /* ゴールド：中級バッジ */
  --gold-light:     #fef3d8;
  --gold-dark:      #7a5010;

  --sage:           #7a9e7e;    /* セージグリーン：初級バッジ・良い例文 */
  --sage-light:     #eaf3eb;
  --sage-dark:      #3d6642;

  --lavender:       #c4829a;    /* ラベンダーローズ：自己理解バッジ */
  --lavender-light: #faeef3;
  --lavender-dark:  #7a3a52;

  --why-color:      #b06040;    /* なぜ欄ラベル */
  --hint-border:    #e0a882;
}

body {
  font-family: 'Noto Sans JP', -apple-system, 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg3);
  background-image:
    radial-gradient(ellipse at 10% 0%, #fde8cc 0%, transparent 55%),
    radial-gradient(ellipse at 90% 100%, #fcd8c8 0%, transparent 55%);
  color: var(--text);
  min-height: 100vh;
  padding: 1.5rem 1rem 3rem;
}
.wrap { max-width: 640px; margin: 0 auto; }

/* ── APP TITLE ── */
.app-header { text-align: center; margin-bottom: 1.5rem; }
.app-title { font-size: 17px; font-weight: 700; color: var(--primary); letter-spacing: .03em; }
.app-tagline { font-size: 12px; color: var(--text3); margin-top: 3px; }

/* ── TOP BAR ── */
.top-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.level-pill { font-size: 11px; font-weight: 700; padding: 5px 13px; border-radius: 20px; white-space: nowrap; letter-spacing: .04em; }
.pill-self   { background: var(--lavender-light); color: var(--lavender-dark); border: 1px solid #e8c0cc; }
.pill-easy   { background: var(--sage-light);     color: var(--sage-dark);     border: 1px solid #c0dac0; }
.pill-medium { background: var(--gold-light);     color: var(--gold-dark);     border: 1px solid #f0d090; }
.pill-hard   { background: var(--rose-light);     color: var(--rose-dark);     border: 1px solid #f0b0b0; }
.pill-desc   { background: #fbe8d8;               color: #7a3010;              border: 1px solid #f0b888; }

.level-dots { display: flex; gap: 4px; flex: 1; }
.dot { height: 7px; flex: 1; border-radius: 4px; background: rgba(180,110,70,0.15); border: none; cursor: pointer; transition: background 0.28s; }
.dot.done   { background: var(--apricot); }
.dot.active { background: var(--primary); }
.dot:hover  { background: #e8a070; }

.reset-btn {
  font-size: 12px; color: var(--text2); background: var(--bg-card);
  border: 1px solid var(--border2); border-radius: var(--radius-sm);
  padding: 5px 12px; cursor: pointer; font-family: inherit;
}
.reset-btn:hover { background: var(--bg2); }

/* ── CARDS ── */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.4rem;
  margin-bottom: 1rem;
  animation: rise 0.22s ease;
  box-shadow: 0 2px 12px rgba(160,80,40,0.07);
}
@keyframes rise { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.card-label {
  font-size: 11px; font-weight: 700; letter-spacing: .08em;
  display: flex; justify-content: space-between; margin-bottom: 12px;
}
.cat-tag {
  background: var(--apricot-light); color: var(--primary);
  padding: 3px 10px; border-radius: 12px;
  font-size: 11px; font-weight: 700; letter-spacing: .05em;
}
.badge-tag {
  background: var(--bg2); color: var(--text3);
  padding: 3px 10px; border-radius: 12px;
  font-size: 11px; font-weight: 600;
}

.card-q { font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.5; margin-bottom: 6px; }
.card-sub { font-size: 12px; color: var(--why-color); margin-bottom: 14px; font-weight: 500; }

.card-detail {
  font-size: 13px; color: var(--text2);
  background: var(--bg2);
  border-left: 3px solid var(--apricot);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: 10px 13px; margin-bottom: 12px; line-height: 1.7;
}
.card-prompt {
  font-size: 13px; color: var(--text2); font-style: italic;
  background: var(--primary-light);
  border-radius: var(--radius-sm);
  padding: 10px 13px; margin-bottom: 14px; line-height: 1.7;
  border-left: 3px solid var(--primary);
}

.hint {
  font-size: 12px; color: var(--text2);
  border-left: 2px solid var(--hint-border);
  background: #fff8f2;
  padding: 7px 11px; margin-bottom: 13px; line-height: 1.6;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}

.tips-box {
  background: var(--sage-light);
  border-radius: var(--radius-sm);
  padding: 10px 13px;
  margin-bottom: 14px;
  border-left: 3px solid var(--sage);
}
.tips-title { font-size: 11px; font-weight: 700; color: var(--sage-dark); margin-bottom: 6px; letter-spacing: .06em; }
.tip { font-size: 13px; color: #4a6e4e; line-height: 1.6; padding: 2px 0; }
.tip::before { content: '✦ '; color: var(--sage); font-size: 10px; }

/* ── L1 PROGRESS DOTS ── */
.l1-dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 14px; }
.l1-dot { width: 9px; height: 9px; border-radius: 5px; background: rgba(180,110,70,0.2); cursor: pointer; transition: all 0.25s; }
.l1-dot.filled  { background: var(--apricot); }
.l1-dot.current { background: var(--primary); width: 22px; }

/* ── INPUTS ── */
textarea {
  width: 100%; min-height: 88px; padding: 11px 13px;
  font-size: 14px; font-family: inherit;
  border: 1.5px solid var(--border2);
  border-radius: var(--radius-sm);
  background: #fffcf9;
  color: var(--text); resize: vertical; line-height: 1.7;
  transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
}
textarea:focus {
  outline: none; border-color: var(--primary);
  background: #ffffff;
  box-shadow: 0 0 0 3px rgba(192,98,42,.12);
}
.why-label { font-size: 12px; font-weight: 700; color: var(--why-color); margin: 11px 0 6px; }
.why-ta { min-height: 58px; font-size: 13px; background: #fff8f2; }

/* ── FEEDBACK ── */
.feedback-box {
  display: none; border-radius: var(--radius-sm);
  padding: 13px 15px; margin-top: 13px;
  animation: rise 0.2s ease;
  border: 1px solid var(--border);
}
.feedback-box.show { display: block; }
.feedback-box.good { background: var(--sage-light); border-color: #b8d8b8; }
.feedback-box.step { background: var(--gold-light);  border-color: #e8c878; }

.fb-head { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
.fb-head.good { color: var(--sage-dark); }
.fb-head.step { color: var(--gold-dark); }

.fb-body { font-size: 13px; color: var(--text2); line-height: 1.65; }
.fb-ex {
  font-size: 13px;
  background: #fff8f2; color: var(--primary-hover);
  border-radius: var(--radius-sm);
  padding: 10px 13px; margin-top: 10px; line-height: 1.7;
  border-left: 3px solid var(--apricot);
  font-style: italic;
}
.fb-ex-label { font-size: 11px; font-weight: 700; color: var(--apricot); letter-spacing:.04em; display:block; margin-bottom:4px; font-style:normal; }

/* ── SUMMARY ── */
.summary-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.4rem;
  animation: rise 0.22s ease;
  box-shadow: 0 2px 12px rgba(160,80,40,0.07);
}
.summary-ttl { font-size: 15px; font-weight: 700; color: var(--primary); margin-bottom: 1rem; }
.s-item { padding: 10px 0; border-bottom: 1px dashed rgba(180,110,70,0.2); }
.s-item:last-of-type { border-bottom: none; }
.s-q { font-size: 11px; font-weight: 700; color: var(--text3); margin-bottom: 4px; letter-spacing:.03em; }
.s-a { font-size: 13px; color: var(--text); line-height: 1.6; }
.s-w { font-size: 12px; color: var(--why-color); margin-top: 5px; line-height: 1.55; background: var(--primary-light); padding: 5px 9px; border-radius: 6px; }
.s-w::before { content: '理由 → '; font-weight: 700; }
.summary-footer {
  font-size: 12px; color: var(--text2); line-height: 1.75;
  margin-top: 1rem; padding-top: 1rem;
  border-top: 1px dashed rgba(180,110,70,0.2);
}

/* ── COMPLETION ── */
.completion { text-align: center; padding: 2.5rem 1rem; }
.comp-icon { font-size: 40px; margin-bottom: 12px; }
.comp-ttl { font-size: 22px; font-weight: 700; color: var(--primary); margin-bottom: 10px; }
.comp-msg { font-size: 14px; color: var(--text2); line-height: 1.8; }

/* ── BUTTONS ── */
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 1rem; }
button {
  cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600;
  border-radius: var(--radius-sm); padding: 9px 18px;
  border: 1.5px solid var(--border2);
  background: var(--bg-card); color: var(--text2);
  transition: background 0.14s, border-color 0.14s, color 0.14s;
}
button:hover { background: var(--bg2); border-color: var(--apricot); color: var(--text); }
button:active { transform: scale(0.98); }

.btn-p {
  background: var(--primary); color: #fff8f2;
  border-color: var(--primary);
}
.btn-p:hover { background: var(--primary-hover); border-color: var(--primary-hover); color: #fff8f2; }

.btn-g { color: var(--sage-dark); border-color: #c0dac0; }
.btn-g:hover { background: var(--sage-light); border-color: var(--sage); color: var(--sage-dark); }

.reset-btn {
  font-size: 12px; color: var(--text3); background: rgba(255,255,255,0.7);
  border: 1px solid var(--border2); border-radius: var(--radius-sm);
  padding: 5px 12px; cursor: pointer; font-family: inherit; font-weight: 500;
}
.reset-btn:hover { background: var(--bg2); color: var(--text2); }

/* ── DESC STEPS ── */
.desc-intro {
  font-size: 13px; color: var(--text2); line-height: 1.7;
  background: var(--lavender-light); border-left: 3px solid var(--lavender);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: 10px 13px; margin-bottom: 16px;
}
.desc-steps { display: flex; flex-direction: column; gap: 12px; margin-bottom: 4px; }
.desc-step { background: var(--bg-card); border: 1.5px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
.desc-step-header {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 13px 8px;
  border-bottom: 1px solid var(--border);
}
.desc-badge {
  font-size: 12px; font-weight: 800; min-width: 28px; height: 28px;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.badge-D { background: #fbe8d8; color: #a84f20; }
.badge-E { background: var(--lavender-light); color: var(--lavender-dark); }
.badge-S { background: var(--sage-light); color: var(--sage-dark); }
.badge-C { background: var(--gold-light); color: var(--gold-dark); }
.desc-step-title { font-size: 13px; font-weight: 700; color: var(--text); }
.desc-step-sub   { font-size: 11px; color: var(--text3); margin-top: 1px; line-height: 1.4; }
.desc-step textarea {
  border: none; border-radius: 0; background: #fffcf9;
  min-height: 68px; font-size: 13px; padding: 9px 13px;
  box-shadow: none;
}
.desc-step textarea:focus { border-color: transparent; box-shadow: inset 0 0 0 2px rgba(192,98,42,.15); }

.desc-fb-wrap { margin-top: 14px; }
.desc-fb-item { margin-bottom: 10px; border-radius: var(--radius-sm); padding: 10px 13px; }
.desc-fb-item.good { background: var(--sage-light); border: 1px solid #b8d8b8; }
.desc-fb-item.step { background: var(--gold-light);  border: 1px solid #e8c878; }
.desc-fb-letter { font-size: 11px; font-weight: 800; margin-bottom: 4px; }
.desc-fb-letter.D { color: #a84f20; }
.desc-fb-letter.E { color: var(--lavender-dark); }
.desc-fb-letter.S { color: var(--sage-dark); }
.desc-fb-letter.C { color: var(--gold-dark); }
.desc-fb-text { font-size: 12px; color: var(--text2); line-height: 1.6; }
.desc-ex-block {
  margin-top: 14px; padding: 13px 14px;
  background: #fff8f2; border-left: 3px solid var(--apricot);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}
.desc-ex-title { font-size: 11px; font-weight: 700; color: var(--apricot); letter-spacing: .05em; margin-bottom: 8px; }
.desc-ex-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: flex-start; }
.desc-ex-row:last-child { margin-bottom: 0; }
.desc-ex-lbl { font-size: 11px; font-weight: 800; min-width: 18px; margin-top: 2px; }
.desc-ex-lbl.D { color: #a84f20; }
.desc-ex-lbl.E { color: var(--lavender-dark); }
.desc-ex-lbl.S { color: var(--sage-dark); }
.desc-ex-lbl.C { color: var(--gold-dark); }
.desc-ex-txt { font-size: 12px; color: var(--primary-hover); line-height: 1.65; font-style: italic; }

/* ── COPY BLOCK ── */
.copy-block {
  margin-top: 14px;
  background: linear-gradient(135deg, #fff8f0 0%, #fef3e8 100%);
  border: 1.5px dashed var(--apricot);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
}
.copy-label {
  font-size: 11px; font-weight: 700; color: var(--primary);
  letter-spacing: .05em; margin-bottom: 5px;
  display: flex; align-items: center; gap: 6px;
}
.copy-desc { font-size: 12px; color: var(--text2); line-height: 1.6; margin-bottom: 10px; }
.copy-dest { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-copy {
  font-size: 12px; font-weight: 700; padding: 8px 15px;
  border-radius: var(--radius-sm); cursor: pointer; font-family: inherit;
  transition: all 0.15s; border: 1.5px solid;
  display: inline-flex; align-items: center; gap: 5px;
}
.btn-copy-chatgpt { background: #10a37f; color: #fff; border-color: #10a37f; }
.btn-copy-chatgpt:hover { background: #0d8f6e; border-color: #0d8f6e; }
.btn-copy-plain { background: var(--bg-card); color: var(--primary); border-color: var(--apricot); }
.btn-copy-plain:hover { background: var(--apricot-light); }
.btn-copy.copied { background: var(--sage-light) !important; color: var(--sage-dark) !important; border-color: var(--sage) !important; }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(16px);
  background: #3d2b1f; color: #fff8f0;
  font-size: 13px; font-weight: 600; font-family: inherit;
  padding: 10px 22px; border-radius: 30px;
  opacity: 0; transition: opacity 0.25s, transform 0.25s;
  pointer-events: none; white-space: nowrap; z-index: 999;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── QR MODAL ── */
#qrOverlay {
  display: none; position: fixed; inset: 0; z-index: 1000;
  background: rgba(61,43,31,0.55); backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
#qrOverlay.show { display: flex; animation: fadeIn2 0.2s ease; }
@keyframes fadeIn2 { from{opacity:0;} to{opacity:1;} }
#qrModal {
  background: #fff; border-radius: 20px;
  padding: 2rem 1.75rem; text-align: center;
  max-width: 340px; width: 90%;
  box-shadow: 0 12px 48px rgba(100,40,10,0.22);
  animation: rise2 0.22s ease;
}
@keyframes rise2 { from{transform:translateY(16px);opacity:0;} to{transform:translateY(0);opacity:1;} }
#qrModal .qr-ttl { font-size: 15px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
#qrModal .qr-sub { font-size: 12px; color: var(--text3); margin-bottom: 1.25rem; line-height: 1.6; }
#qrBox {
  background: var(--bg3); border-radius: 12px;
  padding: 1rem; display: inline-block;
  margin-bottom: 1rem; border: 1px solid var(--border);
}
#qrBox img, #qrBox canvas { display: block; }
#qrModal .qr-url {
  font-size: 10px; font-family: 'Courier New', monospace;
  color: var(--text3); word-break: break-all;
  background: var(--bg2); border-radius: 8px;
  padding: 7px 10px; margin-bottom: 1rem; text-align: left;
}
#qrModal .qr-notice {
  font-size: 11px; color: var(--text3); line-height: 1.65;
  margin-bottom: 1.25rem;
}
#qrModal .qr-notice strong { color: var(--primary); }
#qrCloseBtn {
  background: var(--primary); color: #fff8f2;
  border: none; border-radius: 10px;
  font-size: 13px; font-weight: 700; font-family: inherit;
  padding: 10px 24px; cursor: pointer; transition: background .15s;
}
#qrCloseBtn:hover { background: var(--primary-hover); }
.qr-steps {
  text-align: left; background: var(--sage-light);
  border-radius: 10px; padding: 10px 13px; margin-bottom: 1rem;
}
.qr-step { font-size: 12px; color: var(--text2); padding: 3px 0; line-height: 1.5; }
.qr-step::before { content: '✦ '; color: var(--sage); font-size: 10px; }
</style>
</head>
<body>
<!-- qrcode.js CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<div id="toast"></div>

<!-- QR モーダル -->
<div id="qrOverlay" onclick="closeQR(event)">
  <div id="qrModal">
    <div class="qr-ttl">📱 スマホで開く</div>
    <div class="qr-sub">カメラでQRコードを読み取ってください</div>
    <div class="qr-steps">
      <div class="qr-step">スマホのカメラアプリを起動</div>
      <div class="qr-step">QRコードにかざす</div>
      <div class="qr-step">表示されたURLをタップ</div>
      <div class="qr-step">PCとスマホを<strong>同じWi-Fi</strong>に接続</div>
    </div>
    <div class="qr-box-wrap">
      <div id="qrBox"></div>
    </div>
    <div class="qr-url" id="qrUrl"></div>
    <div class="qr-notice" id="qrNotice"></div>
    <button id="qrCloseBtn" onclick="closeQR()">閉じる</button>
  </div>
</div>

<div class="wrap">
  <div class="app-header">
    <div class="app-title">アサーション自己練習</div>
    <div class="app-tagline">自分を知ることから、気持ちを伝えることへ</div>
  </div>
  <div class="top-bar">
    <div id="levelPill" class="level-pill pill-self">レベル 1</div>
    <div class="level-dots" id="levelDots"></div>
    <div style="display:flex;gap:6px;align-items:center;">
      <button class="reset-btn" onclick="showQR()" title="スマホで開く">📱 QR</button>
      <button class="reset-btn" onclick="resetAll()">リセット</button>
    </div>
  </div>
  <div id="mainArea"></div>
</div>

<script>
// ===== DATA =====
const L1_QS = [
  { q:'何をしていると癒される？', hint: null },
  { q:'どんなことが嬉しい？', hint: null },
  { q:'何をしている時が楽しい？', hint: null },
  { q:'宝物は何？', hint: null },
  { q:'あなたにとって大切な人は？', hint: null },
  { q:'どんなことをされると許せない？', hint:'「許せない」という感覚は、自分の大切な価値観や境界線を教えてくれるサインです。' },
  { q:'どんなことが悲しい？', hint: null },
  { q:'どんなことが恥ずかしい？', hint:'恥ずかしさの裏には、自分が大事にしていることが隠れています。' },
  { q:'どんな人が苦手？', hint: null },
  { q:'どんな人とは距離を取ろうと思う？', hint:'「距離を取る」という判断は自己防衛の大切なスキルです。苦手と距離を置くは違います。' },
];

const FB_GOOD_GENERIC = ['自分の気持ちを正直に言葉にできています。','Iメッセージが自然に使えています。','相手を尊重しながら、自分の気持ちも伝えられています。'];
function rnd(a){ return a[Math.floor(Math.random()*a.length)]; }

// ===== STATE =====
let S = {
  level: 0,
  l1q: 0,
  l1ans: Array(10).fill(''),
  l1why: Array(10).fill(''),
  scenes: [],
  si: 0,
  fbShown: false,
  descSi: 0,
  descShuffled: [],
};

function shuf(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }
function getScenes(lvl){ let a=[]; LEVELS[lvl].cats.forEach(c=>SCENARIOS[c].items.forEach(s=>a.push({...s,cat:SCENARIOS[c].label}))); return shuf(a); }

// ===== RENDER =====
function render(){
  renderDots();
  const lv = LEVELS[S.level];
  const pill = document.getElementById('levelPill');
  pill.className = 'level-pill '+lv.pill;
  pill.textContent = lv.name+' — '+lv.desc;
  if(lv.type==='self') renderL1();
  else if(lv.type==='desc') renderDesc();
  else renderScene();
}

function renderDots(){
  const el = document.getElementById('levelDots');
  el.innerHTML='';
  for(let i=0;i<11;i++){
    const d=document.createElement('div');
    d.className='dot'+(i<S.level?' done':i===S.level?' active':'');
    d.title=LEVELS[i].name;
    d.onclick=()=>goLevel(i);
    el.appendChild(d);
  }
}

// ---- L1 ----
function renderL1(){
  const qi=S.l1q, qd=L1_QS[qi], total=L1_QS.length;
  let dots='<div class="l1-dots">';
  for(let i=0;i<total;i++){
    const filled=S.l1ans[i].trim().length>0;
    const cur=i===qi;
    dots+=`<div class="l1-dot${cur?' current':filled?' filled':''}" onclick="gotoL1(${i})"></div>`;
  }
  dots+='</div>';

  const hintHtml = qd.hint ? `<div class="hint">${qd.hint}</div>` : '';

  const card=`<div class="card">
    <div class="card-label"><span>自己理解ワーク</span><span>${qi+1} / ${total}</span></div>
    <div class="card-q">${qd.q}</div>
    <div class="card-sub">→ なぜそうなのか、理由も考えてみよう</div>
    ${hintHtml}
    <textarea id="l1a" placeholder="思いつくままに書いてみましょう…" oninput="saveL1()">${S.l1ans[qi]}</textarea>
    <div class="why-label">なぜそう感じるのか</div>
    <textarea class="why-ta" id="l1w" placeholder="理由を書いてみましょう…" oninput="saveL1W()">${S.l1why[qi]}</textarea>
  </div>`;

  let btns='<div class="btn-row">';
  if(qi>0) btns+=`<button onclick="prevL1()">← 前へ</button>`;
  if(qi<total-1) btns+=`<button class="btn-p" onclick="nextL1()">次の質問へ →</button>`;
  else           btns+=`<button class="btn-p" onclick="finishL1()">ふりかえりを見る →</button>`;
  btns+='</div>';

  document.getElementById('mainArea').innerHTML = dots+card+btns;
}

function saveL1(){ S.l1ans[S.l1q]=document.getElementById('l1a').value; }
function saveL1W(){ S.l1why[S.l1q]=document.getElementById('l1w').value; }
function nextL1(){ saveL1();saveL1W(); S.l1q=Math.min(S.l1q+1,L1_QS.length-1); render(); }
function prevL1(){ saveL1();saveL1W(); S.l1q=Math.max(S.l1q-1,0); render(); }
function gotoL1(i){ saveL1();saveL1W(); S.l1q=i; render(); }

function finishL1(){
  saveL1();saveL1W();
  let html='<div class="summary-card"><div class="summary-ttl">あなたの自己理解まとめ</div>';
  let any=false;
  L1_QS.forEach((q,i)=>{
    if(S.l1ans[i].trim()){
      any=true;
      html+=`<div class="s-item"><div class="s-q">${q.q}</div><div class="s-a">${S.l1ans[i].replace(/\n/g,'<br>')}</div>`;
      if(S.l1why[i].trim()) html+=`<div class="s-w">${S.l1why[i].replace(/\n/g,'<br>')}</div>`;
      html+='</div>';
    }
  });
  if(!any) html+='<div style="font-size:13px;color:var(--text2);padding:8px 0;">まだ記入がありません。戻って書いてみましょう。</div>';
  html+=`<div class="summary-footer">ここに書いたことがアサーションの土台になります。「大切にしていること」「嫌なこと」を知っていると、自分の気持ちを言葉にしやすくなります。</div>`;
  html+=`<div class="btn-row"><button class="btn-p" onclick="goLevel(1)">レベル 2 へ進む →</button><button onclick="render()">← 質問に戻る</button></div>`;
  html+='</div>';
  document.getElementById('mainArea').innerHTML=html;
}

// ---- SCENARIO ----
function renderScene(){
  const lv=LEVELS[S.level];
  if(!S.scenes.length){ S.scenes=getScenes(S.level); S.si=0; }
  const sc=S.scenes[S.si%S.scenes.length];
  S.fbShown=false;

  const card=`<div class="card">
    <div class="card-label">
      <span class="cat-tag">${sc.cat}</span>
      <span class="badge-tag">${lv.badge}</span>
    </div>
    <div class="card-q">${sc.t}</div>
    <div class="card-detail">${sc.d}</div>
    <div class="card-prompt">${sc.p}</div>
    <div class="tips-box"><div class="tips-title">練習のポイント</div>${lv.tips.map(t=>`<div class="tip">${t}</div>`).join('')}</div>
    <div class="copy-block">
      <div class="copy-label">ChatGPT でロールプレイ練習</div>
      <div class="copy-desc">下のボタンでプロンプトをコピーして、ChatGPT に貼り付けるとロールプレイ練習ができます。</div>
      <div class="copy-dest">
        <button class="btn-copy btn-copy-chatgpt" onclick="copyPrompt('chatgpt')" id="btnChatGPT">
          <span>📋</span> ChatGPT 用にコピー
        </button>
        <button class="btn-copy btn-copy-plain" onclick="copyPrompt('plain')" id="btnPlain">
          <span>📄</span> テキストだけコピー
        </button>
      </div>
    </div>
    <div style="font-size:13px;font-weight:600;color:var(--text3);margin-bottom:7px;margin-top:14px;letter-spacing:.03em;">あなたならどう答えますか？</div>
    <textarea id="scAns" placeholder="ここに自分の言葉で書いてみましょう…"></textarea>
    <div class="feedback-box" id="fbBox">
      <div class="fb-head" id="fbHead"></div>
      <div class="fb-body" id="fbBody"></div>
      <div class="fb-ex" id="fbEx"><span class="fb-ex-label">例文</span><span id="fbExText"></span></div>
    </div>
  </div>`;

  document.getElementById('mainArea').innerHTML = card + makeBtns(false);
}

function makeBtns(fbShown){
  let b=`<div class="btn-row" id="btnRow">
    <button class="btn-p" onclick="checkScene()">フィードバックをもらう ↗</button>
    <button class="btn-g" onclick="shuffleScene()">シャッフル</button>`;
  if(fbShown){
    if(S.level<10) b+=`<button onclick="goLevel(S.level+1)">次のレベルへ →</button>`;
    else           b+=`<button class="btn-p" onclick="showComp()">完了 →</button>`;
  }
  if(S.level>0) b+=`<button onclick="goLevel(S.level-1)">← 前のレベルへ</button>`;
  b+='</div>';
  return b;
}

function checkScene(){
  const ans=(document.getElementById('scAns')||{}).value||'';
  if(!ans.trim()){ document.getElementById('scAns').focus(); return; }
  const sc=S.scenes[S.si%S.scenes.length];
  const score=((/私|わたし|ぼく|僕/.test(ans))?1:0)+(ans.length>25?1:0)+((/思い|感じ|です|ます|嬉し|つら|困|助かり|申し訳|ありがとう|お願い/.test(ans))?1:0);
  const good=score>=2;
  const fbBox = document.getElementById('fbBox');
  fbBox.className = 'feedback-box show ' + (good ? 'good' : 'step');
  document.getElementById('fbHead').className = 'fb-head ' + (good ? 'good' : 'step');
  document.getElementById('fbHead').textContent = good ? 'よくできています' : 'さらに一歩';
  document.getElementById('fbBody').textContent = good
    ? (sc.good_fb || rnd(FB_GOOD_GENERIC))
    : (sc.imp_fb  || 'Iメッセージ（「私は〜」）を使いながら、自分の気持ちと希望を具体的に伝えてみましょう。');
  document.getElementById('fbExText').textContent = sc.ex;
  S.fbShown=true;
  const old=document.getElementById('btnRow');
  if(old){ const tmp=document.createElement('div'); tmp.innerHTML=makeBtns(true); old.replaceWith(tmp.firstChild); }
}

function copyPrompt(mode){
  const sc = S.scenes[S.si % S.scenes.length];
  const lv = LEVELS[S.level];

  const chatgptText =
`あなたはロールプレイの練習相手です。以下の設定でシナリオを演じてください。

【練習テーマ】${lv.name}：${lv.desc}
【場面】${sc.cat} ／ ${sc.t}
【状況説明】${sc.d}
【私が練習したいこと】${sc.p}

【お願い】
・あなたは相手役（上司・家族・友人など）として自然に話しかけてください。
・私がアサーティブに返答したら、相手役として自然に反応してください。
・1〜2往復やりとりした後、私の返答についてアサーションの観点から短くフィードバックしてください。
・まず最初に相手役として話しかけるセリフを言ってください。`;

  const plainText =
`【練習テーマ】${lv.name}：${lv.desc}
【場面】${sc.cat} ／ ${sc.t}
【状況】${sc.d}
【目標】${sc.p}`;

  const text = mode === 'chatgpt' ? chatgptText : plainText;
  const btnId = mode === 'chatgpt' ? 'btnChatGPT' : 'btnPlain';
  const label = mode === 'chatgpt' ? '📋 ChatGPT 用にコピー' : '📄 テキストだけコピー';
  const doneLabel = mode === 'chatgpt' ? '✓ コピーしました！' : '✓ コピーしました！';

  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.getElementById(btnId);
    if(btn){
      btn.classList.add('copied');
      btn.innerHTML = doneLabel;
      setTimeout(()=>{
        btn.classList.remove('copied');
        btn.innerHTML = (mode==='chatgpt' ? '<span>📋</span> ChatGPT 用にコピー' : '<span>📄</span> テキストだけコピー');
      }, 2200);
    }
    showToast(mode==='chatgpt'
      ? 'コピー完了！ChatGPT に貼り付けてロールプレイ開始 🎭'
      : 'テキストをコピーしました ✓');
    if(mode==='chatgpt'){
      setTimeout(()=>{ window.open('https://chat.openai.com/', '_blank'); }, 400);
    }
  }).catch(()=>{
    showToast('コピーに失敗しました。手動でお試しください。');
  });
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

// ---- DESC LEVEL ----
function renderDesc(){
  if(!S.descShuffled.length){ S.descShuffled=shuf([...DESC_SCENES]); S.descSi=0; }
  const sc=S.descShuffled[S.descSi%S.descShuffled.length];

  const steps=[
    { key:'D', label:'D — describe', sub:'客観的な事実・状況を描写する（主観・感情は入れない）', ph:'誰もが認められる事実を具体的に…', cls:'badge-D' },
    { key:'E', label:'E — express / empathize', sub:'自分の気持ちを「私は…」で伝える／相手の気持ちへの共感', ph:'私は…と感じています。あなたの…は伝わっています。', cls:'badge-E' },
    { key:'S', label:'S — specify', sub:'相手が受け入れやすい具体的・現実的な提案をする', ph:'〜していただけますか？〜はどうでしょうか？', cls:'badge-S' },
    { key:'C', label:'C — choose', sub:'相手が断った場合の代替案・選択肢を示す', ph:'もし難しければ、〜という方法もあります。', cls:'badge-C' },
  ];

  const stepsHtml=steps.map(s=>`
    <div class="desc-step">
      <div class="desc-step-header">
        <div class="desc-badge ${s.cls}">${s.key}</div>
        <div><div class="desc-step-title">${s.label}</div><div class="desc-step-sub">${s.sub}</div></div>
      </div>
      <textarea id="desc${s.key}" placeholder="${s.ph}"></textarea>
    </div>`).join('');

  const card=`<div class="card">
    <div class="card-label">
      <span class="cat-tag">${sc.cat}</span>
      <span class="badge-tag">DESC法</span>
    </div>
    <div class="card-q">${sc.title}</div>
    <div class="card-detail">${sc.situation}</div>
    <div class="card-prompt">${sc.goal}</div>
    <div class="desc-intro">
      <strong>DESC法</strong>とは、課題・問題解決に使える表現スキルです。<br>
      D（描写）→ E（表現・共感）→ S（提案）→ C（代替案）の順に、自分の気持ちと希望を整理して伝えます。<br>
      各欄にあなたの言葉で書いてみましょう。
    </div>
    <div class="desc-steps">${stepsHtml}</div>
    <div class="feedback-box" id="descFbBox"></div>
  </div>`;

  const btns=`<div class="btn-row" id="btnRow">
    <button class="btn-p" onclick="checkDesc()">フィードバックをもらう ↗</button>
    <button class="btn-g" onclick="shuffleDesc()">シャッフル</button>
    <button onclick="goLevel(S.level-1)">← 前のレベルへ</button>
  </div>`;

  document.getElementById('mainArea').innerHTML = card + btns;
}

function checkDesc(){
  const vals={ D:(document.getElementById('descD')||{}).value||'', E:(document.getElementById('descE')||{}).value||'', S:(document.getElementById('descS')||{}).value||'', C:(document.getElementById('descC')||{}).value||'' };
  const allEmpty=Object.values(vals).every(v=>!v.trim());
  if(allEmpty){ document.getElementById('descD').focus(); return; }

  const sc=S.descShuffled[S.descSi%S.descShuffled.length];

  const checks={
    D:{ label:'D — 描写', good:'客観的な事実を描写できています。感情を混ぜずに状況を伝えられています。', imp:'「私はこう思う」など主観が混じっていないか確認しましょう。日時・頻度・具体的な状況など、誰もが認められる事実を書きましょう。', ex:sc.ex.D },
    E:{ label:'E — 表現・共感', good:'「私は…」というIメッセージで気持ちを伝えられています。相手への共感も示せています。', imp:'「あなたのせいで」ではなく「私は…と感じている」という形にしましょう。相手の気持ちへの共感の一言も添えると伝わりやすくなります。', ex:sc.ex.E },
    S:{ label:'S — 提案', good:'具体的で相手が受け入れやすい提案ができています。', imp:'「〜してほしい」ではなく「〜していただけますか？」と提案形にしましょう。小さな・現実的な変化をお願いするのがポイントです。', ex:sc.ex.S },
    C:{ label:'C — 代替案', good:'相手が断った場合の選択肢を用意できています。心の余裕につながります。', imp:'相手が「ノー」と言ったときのために、別の選択肢を準備しましょう。脅かすのではなく、お互いにとって現実的な案を。', ex:sc.ex.C },
  };

  let fbHtml='<div class="desc-fb-wrap">';
  ['D','E','S','C'].forEach(k=>{
    const v=vals[k].trim();
    const ck=checks[k];
    const hasContent=v.length>0;
    const isGood=hasContent && v.length>15;
    fbHtml+=`<div class="desc-fb-item ${isGood?'good':'step'}">
      <div class="desc-fb-letter ${k}">${ck.label}</div>
      <div class="desc-fb-text">${hasContent?(isGood?ck.good:ck.imp):'まだ記入がありません。上のヒントを参考に書いてみましょう。'}</div>
    </div>`;
  });
  fbHtml+='</div>';

  fbHtml+=`<div class="desc-ex-block">
    <div class="desc-ex-title">例文（PDFより）</div>
    ${['D','E','S','C'].map(k=>`<div class="desc-ex-row"><div class="desc-ex-lbl ${k}">${k}</div><div class="desc-ex-txt">${sc.ex[k]}</div></div>`).join('')}
  </div>`;

  const fbBox=document.getElementById('descFbBox');
  fbBox.className='feedback-box show';
  fbBox.style.background='none';
  fbBox.style.border='none';
  fbBox.style.padding='0';
  fbBox.innerHTML=fbHtml;

  // ボタン更新
  const old=document.getElementById('btnRow');
  if(old){
    const tmp=document.createElement('div');
    tmp.innerHTML=`<div class="btn-row" id="btnRow">
      <button class="btn-p" onclick="checkDesc()">もう一度チェック ↗</button>
      <button class="btn-g" onclick="shuffleDesc()">シャッフル</button>
      <button class="btn-p" onclick="showComp()">完了 →</button>
      <button onclick="goLevel(S.level-1)">← 前のレベルへ</button>
    </div>`;
    old.replaceWith(tmp.firstChild);
  }
}

function shuffleDesc(){
  S.descSi=(S.descSi+1)%S.descShuffled.length;
  renderDesc();
}

function shuffleScene(){
  S.si=(S.si+1)%S.scenes.length;
  renderScene();
}

function goLevel(n){
  S.level=n; S.fbShown=false;
  if(n>0){ S.scenes=getScenes(n); S.si=0; }
  render();
}

function showComp(){
  renderDots();
  document.getElementById('levelPill').textContent='全レベル完了';
  document.getElementById('levelPill').className='level-pill pill-self';
  document.getElementById('mainArea').innerHTML=`<div class="card completion">
    <div class="comp-icon">🌸</div>
    <div class="comp-ttl">全レベル完了！</div>
    <div class="comp-msg">レベル1（自己理解）からレベル11（DESC法）まで、すべての練習を終えました。<br><br>アサーションは日々の積み重ねです。難しかったシナリオはまた戻って練習できます。あなたのペースで続けましょう。</div>
    <div class="btn-row" style="justify-content:center;margin-top:1.5rem;">
      <button class="btn-p" onclick="resetAll()">最初からやり直す</button>
      <button onclick="goLevel(10)">レベル11に戻る</button>
    </div>
  </div>`;
}

function resetAll(){
  S={ level:0, l1q:0, l1ans:Array(10).fill(''), l1why:Array(10).fill(''), scenes:[], si:0, fbShown:false, descSi:0, descShuffled:[] };
  render();
}

// ===== QR CODE =====
function showQR(){
  const overlay = document.getElementById('qrOverlay');
  const box     = document.getElementById('qrBox');
  const urlEl   = document.getElementById('qrUrl');
  const notice  = document.getElementById('qrNotice');
  const url     = window.location.href;

  box.innerHTML = '';
  urlEl.textContent = url;

  const isFile = url.startsWith('file://');
  if(isFile){
    notice.innerHTML =
      '<strong>💡 ローカルファイルとして開いています</strong><br><br>' +
      'スマホからアクセスするには、このHTMLファイルを<br>' +
      '① Google Drive / Dropbox にアップロードして共有リンクを取得する<br>' +
      '② または対応アプリ（例：Documents by Readdle）でLAN共有する<br><br>' +
      '現在のURLのQRコードは下に表示しています（PCブックマーク用）。';
  } else {
    notice.innerHTML =
      'スマホのカメラでQRを読み取るとアプリが開きます。<br>' +
      'PCとスマホが<strong>同じWi-Fi</strong>に接続されている必要があります。';
  }

  try {
    new QRCode(box, {
      text: url,
      width: 200, height: 200,
      colorDark: '#3d2b1f', colorLight: '#fffaf6',
      correctLevel: QRCode.CorrectLevel.M
    });
  } catch(e) {
    box.innerHTML = '<div style="font-size:12px;color:#b08c78;padding:1rem;line-height:1.6;">QRコード生成に失敗しました。<br>上のURLをコピーしてお使いください。</div>';
  }

  overlay.classList.add('show');
}

function closeQR(e){
  if(!e || e.target === document.getElementById('qrOverlay')){
    document.getElementById('qrOverlay').classList.remove('show');
  }
}

render();
</script>
</body>
</html>
